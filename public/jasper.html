<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Jasper — Quiz</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="wrap">
  <div id="join-screen" class="card">
    <h2>Jasper, join here</h2>
    <input id="roomCode" placeholder="Room code" autocapitalize="characters">
    <button id="joinBtn">I'm Jasper</button>
    <div id="joinError" class="muted"></div>
  </div>

  <div id="game-screen" style="display:none;">
    <div class="card">
      <h2>Jasper's screen</h2>
      <div class="muted">Room <span id="roomCodeDisplay"></span> — good luck.</div>
    </div>

    <div id="roundCard" class="card" style="display:none;">
      <h3 id="roundTitle"></h3>
      <div id="roundCompleteNote" class="muted" style="display:none;">This round is complete — answers are locked in.</div>
      <div id="questionNav" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;"></div>
    </div>

    <div id="questionCard" class="card" style="display:none;">
      <span id="statusBadge" class="badge"></span>
      <h3 id="qBody"></h3>
      <div id="optionsArea"></div>
      <div id="hintsArea"></div>
      <div id="submitArea" style="display:none;">
        <button id="submitBtn">Submit answer</button>
      </div>
      <div id="submittedNote" class="muted" style="display:none;">Answer submitted ✓ — you can change it until this round ends.</div>
      <div id="readOnlyNote" class="muted" style="display:none;"></div>
    </div>

    <div id="noQuestionsYet" class="card muted">Waiting for the host to open the first question…</div>
  </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="/jasper.js"></script>
</body>
</html>
